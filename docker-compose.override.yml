version: '3.8'
services:
  gpt-researcher:
    extra_hosts:
      - "host.docker.internal:host-gateway"

    command: >
      /bin/sh -lc "
      python -m pip install --no-cache-dir -r requirements.txt &&
      uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1
      "
    
  gptr-nextjs:
    command: ["npm", "run", "dev", "--", "-p", "3037"]
