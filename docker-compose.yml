services:
  gpt-researcher:
    pull_policy: build
    image: gptresearcher/gpt-researcher
    build: ./
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LOGGING_LEVEL: INFO
      PORT: 8000
    volumes:
      - ${PWD}/my-docs:/usr/src/app/my-docs:rw
      - ${PWD}/outputs:/usr/src/app/outputs:rw
      - ${PWD}/logs:/usr/src/app/logs:rw
    user: root
    restart: always
    ports:
      - 8067:8000
      
  gptr-nextjs:
    pull_policy: build
    image: gptresearcher/gptr-nextjs
    stdin_open: true
    environment:
      CHOKIDAR_USEPOLLING: "true"
      LOGGING_LEVEL: INFO
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID}
      NEXT_PUBLIC_GPTR_API_URL: ${NEXT_PUBLIC_GPTR_API_URL}
      PORT: 3037 
    build:
      dockerfile: Dockerfile.dev
      context: frontend/nextjs
    volumes:
      - /app/node_modules
      - ./frontend/nextjs/src:/app/src
      - ./frontend/nextjs/public:/app/public
      - ./frontend/nextjs/components:/app/components
      - ./frontend/nextjs/app:/app/app
      - ./frontend/nextjs/styles:/app/styles
      - ./frontend/nextjs/types:/app/types
      - ./frontend/nextjs/utils:/app/utils
      - ./frontend/nextjs/hooks:/app/hooks
      - ./frontend/nextjs/helpers:/app/helpers
      - ./frontend/nextjs/config:/app/config
      - ./frontend/nextjs/actions:/app/actions
      - ./outputs:/app/outputs
    restart: always
    ports:
      - 3037:3037

  gpt-researcher-mcp:
    pull_policy: build
    image: gptresearcher/gpt-researcher
    build: ./
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LOGGING_LEVEL: INFO
      PORT: 3001
      MCP_SERVER_ENABLED: "true"
      MCP_SERVER_PORT: "3001"
      MCP_SERVER_HOST: "0.0.0.0"
      # Ollama configuration
      OPENAI_BASE_URL: "http://host.docker.internal:11434/v1"
      OPENAI_API_KEY: "ollama"
      FAST_LLM: "ollama:gpt-oss:20b"
      SMART_LLM: "ollama:gpt-oss:20b"
      STRATEGIC_LLM: "ollama:gpt-oss:20b"
      EMBEDDING_PROVIDER: "ollama"
      EMBEDDING: "ollama:snowflake-arctic-embed2"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${PWD}/my-docs:/usr/src/app/my-docs:rw
      - ${PWD}/outputs:/usr/src/app/outputs:rw
      - ${PWD}/logs:/usr/src/app/logs:rw
    user: root
    restart: always
    ports:
      - "3001:3001"
    command: >
      /bin/sh -lc "
      python -m pip install --no-cache-dir -r requirements.txt &&
      python -m gpt_researcher.mcp.server
      "

  gpt-researcher-tests:
    image: gptresearcher/gpt-researcher-tests
    build: ./
    environment: 
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LOGGING_LEVEL: INFO
    profiles: ["test"]
    command: >
      /bin/sh -c "
      pip install pytest pytest-asyncio faiss-cpu &&
      python -m pytest tests/report-types.py &&
      python -m pytest tests/vector-store.py
      "
  
  discord-bot:
    build:
      context: ./docs/discord-bot
      dockerfile: Dockerfile.dev
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
    volumes:
      - ./docs/discord-bot:/app
      - /app/node_modules
    ports:
      - 3039:3000
    profiles: ["discord"]
    restart: always
