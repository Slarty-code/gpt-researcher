services:
  gpt-researcher:
    pull_policy: build
    image: gptresearcher/gpt-researcher
    build: ./
    environment:
      # --- Force OpenAI client to hit Ollama ---
      OPENAI_BASE_URL: "http://host.docker.internal:11434/v1"
      OPENAI_API_KEY: "ollama"                       # must be non-empty

      # --- Explicit model choices (avoid 'gpt-5' fallback) ---
      FAST_LLM: "ollama:gpt-oss:20b"
      SMART_LLM: "ollama:gpt-oss:20b"
      STRATEGIC_LLM: "ollama:gpt-oss:20b"
      EMBEDDING_PROVIDER: "ollama"
      EMBEDDING: "ollama:snowflake-arctic-embed2"

      # --- Search providers ---
      RETRIEVER: "${RETRIEVER:-tavily,searx}"        # note the correct var name + quotes
      TAVILY_API_KEY: "${TAVILY_API_KEY}"
      SEARX_URL: "http://host.docker.internal:8080"

      # --- Logging / Langsmith off (stop the 403 spam) ---
      LOGGING_LEVEL: "INFO"
      LANGCHAIN_TRACING_V2: "false"
      LANGCHAIN_API_KEY: ""

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - ./my-docs:/usr/src/app/my-docs:rw
      - ./outputs:/usr/src/app/outputs:rw
      - ./logs:/usr/src/app/logs:rw

    user: root
    restart: always

    # App listens on 8000 inside; publish 8067 outside
    ports:
      - "8067:8000"

      
  gptr-nextjs:
    pull_policy: build
    image: gptresearcher/gptr-nextjs
    stdin_open: true
    environment:
      CHOKIDAR_USEPOLLING: "true"
      LOGGING_LEVEL: "INFO"
      NEXT_PUBLIC_GA_MEASUREMENT_ID: "${NEXT_PUBLIC_GA_MEASUREMENT_ID}"
      NEXT_PUBLIC_GPTR_API_URL: "http://gpt-researcher:8000"   # <— change from :8067 to :8000
    build:
      dockerfile: Dockerfile.dev
      context: frontend/nextjs
    volumes:
      - /app/node_modules
      - ./frontend/nextjs:/app
      - ./frontend/nextjs/.next:/app/.next
      - ./outputs:/app/outputs
    restart: always
    ports:
      - "3037:3000"

  gpt-researcher-tests:
    image: gptresearcher/gpt-researcher-tests
    build: ./
    environment: 
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LOGGING_LEVEL: INFO
    profiles: ["test"]
    command: >
      /bin/sh -c "
      pip install pytest pytest-asyncio faiss-cpu &&
      python -m pytest tests/report-types.py &&
      python -m pytest tests/vector-store.py
      "
  
  discord-bot:
    build:
      context: ./docs/discord-bot
      dockerfile: Dockerfile.dev
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
    volumes:
      - ./docs/discord-bot:/app
      - /app/node_modules
    ports:
      - 3035:3000
    profiles: ["discord"]
    restart: always
